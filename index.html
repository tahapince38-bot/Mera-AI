<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mera AI - Powered by Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1f1f1f; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .user-msg { background: #f0f4f9; border-radius: 18px 18px 4px 18px; align-self: flex-end; animation: fadeIn 0.3s ease; }
        .ai-msg { background: #ffffff; border: 1px solid #f0f0f0; border-radius: 18px 18px 18px 4px; align-self: flex-start; animation: fadeIn 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .typing { font-style: italic; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="glass-header p-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-blue-200">M</div>
            <h1 class="font-semibold text-lg tracking-tight">Mera AI</h1>
        </div>
        <div class="flex items-center gap-2">
            <span class="bg-blue-50 text-blue-600 text-[10px] px-3 py-1 rounded-full font-bold border border-blue-100 uppercase">Admin: Taha</span>
            <div class="w-8 h-8 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center text-xs">TA</div>
        </div>
    </header>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:px-20 lg:px-64 flex flex-col gap-4 chat-container">
        <div id="welcome-screen" class="mt-20 text-center">
            <h2 class="text-4xl font-bold bg-gradient-to-r from-blue-600 to-indigo-500 bg-clip-text text-transparent mb-2">Assalam-o-Alaikum</h2>
            <p class="text-gray-400">Main Admin Taha ka personal AI hoon. Main aapki kya madad kar sakta hoon?</p>
        </div>
    </div>

    <div class="p-4 md:px-20 lg:px-64 bg-white">
        <div class="relative flex items-center bg-[#f8fafd] rounded-2xl border border-gray-200 p-2 focus-within:border-blue-400 transition-all shadow-sm">
            <input id="user-input" type="text" placeholder="Ask Mera AI anything..." 
                class="w-full bg-transparent p-3 outline-none text-sm" autofocus>
            <button onclick="sendMessage()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-medium hover:bg-blue-700 transition-all">
                Send
            </button>
        </div>
        <p class="text-[10px] text-center text-gray-400 mt-2">Mera AI is powered by Gemini 2.5 Flash</p>
    </div>

    <script>
        const API_KEY = "AIzaSyA9yPbDrsU2VQ7xMdEyZRhibIV9Wm5sff8"; // Aapki API Key yahan hai
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const welcomeScreen = document.getElementById('welcome-screen');

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Hide welcome screen on first message
            if (welcomeScreen) welcomeScreen.style.display = 'none';

            // User message UI
            appendMessage(message, 'user');
            userInput.value = '';

            // Loading indicator
            const loadingId = 'loading-' + Date.now();
            appendMessage('Mera AI is thinking...', 'ai', loadingId);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: message }] }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                // Update loading message with real response
                document.getElementById(loadingId).innerText = aiText;

            } catch (error) {
                document.getElementById(loadingId).innerText = "Error: Kuch masla hua hai. Check your internet or API key.";
                console.error(error);
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendMessage(text, sender, id = '') {
            const div = document.createElement('div');
            div.className = `p-4 max-w-[85%] text-sm ${sender === 'user' ? 'user-msg' : 'ai-msg'}`;
            if (id) div.id = id;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
