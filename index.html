<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mera AI - Admin Taha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #ffffff; font-family: 'Inter', sans-serif; }
        .ai-msg { background: #f0f4f9; border-radius: 15px 15px 15px 2px; }
        .user-msg { background: #007bff; color: white; border-radius: 15px 15px 2px 15px; }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <nav class="p-4 border-b flex justify-between items-center bg-white sticky top-0">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-lg font-bold">M</div>
            <span class="font-bold text-xl">Mera AI</span>
        </div>
        <span class="text-xs font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-full">ADMIN: TAHA</span>
    </nav>

    <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4 md:px-20 lg:px-64">
        <div id="welcome" class="text-center py-20">
            <h1 class="text-4xl font-bold text-gray-800">Assalam-o-Alaikum</h1>
            <p class="text-gray-500 mt-2">Main aapka personal AI hoon. Aaj kya help karun?</p>
        </div>
    </div>

    <div class="p-4 border-t bg-gray-50">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input id="userInput" type="text" placeholder="Ask anything..." 
                class="flex-1 p-4 rounded-2xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
            <button onclick="handleChat()" class="bg-blue-600 text-white px-6 py-4 rounded-2xl font-bold hover:bg-blue-700">
                Send
            </button>
        </div>
    </div>

    <script>
        // AAPKI NEW KEY
        const API_KEY = "AIzaSyA6lR4XMvaIuWVdsGa4QYXaOT_mWqEsPXY"; 

        async function handleChat() {
            const inputField = document.getElementById('userInput');
            const text = inputField.value.trim();
            if (!text) return;

            document.getElementById('welcome').style.display = 'none';
            addMessage(text, 'user');
            inputField.value = '';

            const tempId = 'ai-' + Date.now();
            addMessage('Thinking...', 'ai', tempId);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0]) {
                    const reply = data.candidates[0].content.parts[0].text;
                    document.getElementById(tempId).innerText = reply;
                } else {
                    document.getElementById(tempId).innerText = "Error: Key expire ya block ho gayi hai!";
                }
            } catch (err) {
                document.getElementById(tempId).innerText = "Net ka masla hai ya key block ho gayi!";
            }
        }

        function addMessage(text, type, id = '') {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `p-4 max-w-[80%] ${type === 'user' ? 'user-msg ml-auto' : 'ai-msg mr-auto'}`;
            if (id) div.id = id;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('userInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleChat();
        });
    </script>
</body>
</html>
