<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mera AI - Gemini 2.5 Flash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1f1f1f; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .sidebar-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body class="flex h-screen w-screen">

    <div id="sidebar" class="sidebar-transition w-64 h-full bg-[#f8fafd] border-r border-gray-200 flex flex-col p-4 z-20">
        <div class="flex items-center gap-2 px-2 mb-8">
            <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">M</div>
            <span class="font-semibold text-lg">Mera AI</span>
        </div>
        <button class="flex items-center gap-3 bg-[#e1eaf9] hover:bg-[#d2e3fc] p-3 rounded-2xl transition-all mb-4">
            <span class="text-xl">+</span> <span class="text-sm font-medium">New Chat</span>
        </button>
        <div class="flex-1 overflow-y-auto">
            <p class="text-xs font-semibold text-gray-500 px-2 mb-2">Recent</p>
            <div class="space-y-1">
                <div class="p-2 text-sm hover:bg-gray-200 rounded-lg cursor-pointer truncate">Project Research</div>
                <div class="p-2 text-sm hover:bg-gray-200 rounded-lg cursor-pointer truncate">Coding Assistance</div>
            </div>
        </div>
        <div class="pt-4 border-t border-gray-200">
            <div id="adminBadge" class="hidden flex items-center gap-2 p-2 bg-blue-50 text-blue-700 rounded-xl border border-blue-100 mb-2">
                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                <span class="text-xs font-bold uppercase tracking-wider">Admin: Taha</span>
            </div>
            <div class="text-xs text-gray-400 px-2">Gemini 2.5 Flash v1.0</div>
        </div>
    </div>

    <main class="flex-1 flex flex-col relative bg-white">
        <header class="h-16 flex items-center justify-between px-6 border-b border-transparent">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-gray-100 rounded-full">☰</button>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-600">usmanmianrajjpot@gmail.com</span>
                <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center border border-blue-200">👤</div>
            </div>
        </header>

        <div id="chatArea" class="flex-1 overflow-y-auto chat-container p-4 md:px-32 lg:px-64 flex flex-col gap-6">
            <div class="mt-20 text-center animate-fade">
                <h1 class="text-4xl font-medium bg-gradient-to-r from-blue-600 to-purple-500 bg-clip-text text-transparent mb-2">
                    Assalam-o-Alaikum
                </h1>
                <p class="text-gray-500 text-lg">How can Mera AI help you today?</p>
            </div>
        </div>

        <div class="p-4 md:px-32 lg:px-64 pb-8">
            <div class="glass flex flex-col rounded-[32px] p-2 shadow-lg border border-gray-200 transition-all focus-within:ring-2 focus-within:ring-blue-100">
                <textarea id="userInput" placeholder="Ask Mera AI..." class="w-full bg-transparent p-4 outline-none resize-none min-h-[60px] max-h-[200px]" rows="1"></textarea>
                <div class="flex justify-between items-center p-2">
                    <div class="flex gap-2">
                        <button class="p-2 hover:bg-gray-100 rounded-full">🖼️</button>
                        <button class="p-2 hover:bg-gray-100 rounded-full">🎤</button>
                    </div>
                    <button onclick="sendMessage()" class="bg-blue-600 text-white px-5 py-2 rounded-full font-medium hover:bg-blue-700 transition-all">Send</button>
                </div>
            </div>
            <p class="text-[10px] text-center mt-3 text-gray-400">Mera AI may display inaccurate info, so double-check its responses.</p>
        </div>
    </main>

    <script>
        const userEmail = "usmanmianrajjpot@gmail.com";

        // Check for Admin Taha
        window.onload = () => {
            if(userEmail === "usmanmianrajjpot@gmail.com") {
                document.getElementById('adminBadge').classList.remove('hidden');
            }
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('w-64');
            sb.classList.toggle('w-0');
            sb.classList.toggle('opacity-0');
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const chatArea = document.getElementById('chatArea');
            if(!input.value.trim()) return;

            // Simple User Message UI
            const msg = `<div class="animate-fade self-end bg-[#f0f4f9] p-4 rounded-2xl max-w-[80%] shadow-sm text-sm">${input.value}</div>`;
            chatArea.innerHTML += msg;
            input.value = '';
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    </script>
</body>
</html>
