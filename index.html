<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mera AI - Admin Taha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .chat-container { max-width: 800px; margin: auto; height: calc(100vh - 140px); overflow-y: auto; padding: 20px; }
        .user-bubble { background: #0066ff; color: white; border-radius: 20px 20px 4px 20px; padding: 12px 18px; align-self: flex-end; box-shadow: 0 4px 12px rgba(0,102,255,0.2); }
        .ai-bubble { background: white; color: #1e293b; border-radius: 20px 20px 20px 4px; padding: 12px 18px; align-self: flex-start; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .typing { color: #94a3b8; font-size: 0.8rem; margin-left: 10px; display: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">M</div>
            <div>
                <h1 class="font-bold text-gray-800 leading-none">Mera AI</h1>
                <span class="text-[10px] text-blue-600 font-bold tracking-widest uppercase">Gemini 2.0 Flash</span>
            </div>
        </div>
        <div class="bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full text-xs font-bold border border-blue-100">
            ADMIN: TAHA
        </div>
    </nav>

    <div id="chat-box" class="flex-1 flex flex-col gap-4 chat-container">
        <div class="text-center py-10">
            <h2 class="text-3xl font-extrabold text-gray-900">Assalam-o-Alaikum, Taha!</h2>
            <p class="text-gray-500 mt-2">Main bilkul ready hoon. Kuch bhi poochiye.</p>
        </div>
    </div>

    <div id="typing" class="typing px-10 mb-2">Mera AI is thinking...</div>

    <div class="p-4 bg-white border-t">
        <div class="max-w-3xl mx-auto flex gap-3 items-center bg-gray-50 rounded-2xl p-2 border focus-within:border-blue-500 transition-all">
            <input id="user-input" type="text" placeholder="Ask Mera AI something..." class="flex-1 bg-transparent p-3 outline-none text-sm">
            <button onclick="askAI()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-md">
                Send
            </button>
        </div>
    </div>

    <script>
        // 1. AIzaSyB1QG96Wa6pLM_-RML0juKDtF1fZ63hKQw
        const CONST_KEY = "AIzaSyB1QG96Wa6pLM_-RML0juKDtF1fZ63hKQw"; 

        async function askAI() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            // Show User Message
            addMsg(text, 'user');
            input.value = '';
            
            // Show Typing
            const typing = document.getElementById('typing');
            typing.style.display = 'block';

            try {
                // Gemini 1.5 Flash (Free & Fast)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONST_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                
                typing.style.display = 'none';

                if (data.candidates && data.candidates[0]) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    addMsg(aiReply, 'ai');
                } else {
                    // Specific Error Check
                    if (data.error && data.error.status === "PERMISSION_DENIED") {
                        addMsg("Taha bhai, ye key block ho chuki hai. AI Studio se 'New Key' bana kar paste karein.", 'ai');
                    } else {
                        addMsg("Kuch technical masla hai. Key check karein.", 'ai');
                    }
                }
            } catch (err) {
                typing.style.display = 'none';
                addMsg("Internet connection check karein.", 'ai');
            }
        }

        function addMsg(text, sender) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'user-bubble' : 'ai-bubble';
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('user-input').addEventListener("keypress", (e) => {
            if (e.key === "Enter") askAI();
        });
    </script>
</body>
</html>
